name: 🚀 SaaS Boilerplate CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install flask flask-sqlalchemy flask-login \
                    flask-mail flask-migrate werkzeug \
                    python-dotenv pytest pytest-cov

    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}
        FLASK_ENV: testing
        SECRET_KEY: test-secret
        APP_NAME: TestApp
      run: pytest tests/ -v
